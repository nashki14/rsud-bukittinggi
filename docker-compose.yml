version: '3.8'

services:
  rsud_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rsud-web:latest
    container_name: rsud-web
    restart: unless-stopped
    ports:
      - "8086:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://10.1.1.127:8086
      DB_CONNECTION: mysql
      DB_HOST: rsud_db
      DB_PORT: 3306
      DB_DATABASE: rsud_profile
      DB_USERNAME: rsud_user
      DB_PASSWORD: RsudBkt2024!
    depends_on:
      rsud_db:
        condition: service_healthy
    networks:
      - rsud-net
    volumes:
      - rsud_storage:/var/www/html/storage/app
      - rsud_logs:/var/www/html/storage/logs

  rsud_db:
    image: mysql:8.0
    container_name: rsud-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rsud_profile
      MYSQL_USER: rsud_user
      MYSQL_PASSWORD: RsudBkt2024!
      MYSQL_ROOT_PASSWORD: RsudBktRoot2024!
    volumes:
      - rsud_db_data:/var/lib/mysql
    networks:
      - rsud-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRsudBktRoot2024!"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rsud_db_data:
  rsud_storage:
  rsud_logs:

networks:
  rsud-net:
    driver: bridge
